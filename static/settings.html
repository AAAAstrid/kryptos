<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kryptos — 设置</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/theme.js"></script>
  <script src="/static/font-picker.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>Kryptos</h1>
    <span class="subtitle">设置</span>
    <nav class="topnav">
      <a href="/">主界面</a>
    </nav>
  </header>

  <main class="settings-page">
    <section class="settings-card">
      <h2>主题</h2>
      <div class="preset-row">
        <button type="button" class="ghost" data-preset="dark">暗色</button>
        <button type="button" class="ghost" data-preset="light">浅色</button>
      </div>
      <p class="hint">点击色块选择颜色。强调色会同步用于按钮、链接与对话引号高亮。</p>
      <div class="theme-color-grid">
        <label class="theme-color-item" title="背景">
          <input type="color" id="theme-color-bg" class="theme-color-input" value="#0f1117" />
          <span class="theme-swatch" id="swatch-bg"></span>
          <span class="theme-color-label">背景</span>
        </label>
        <label class="theme-color-item" title="面板">
          <input type="color" id="theme-color-panel" class="theme-color-input" value="#1a1d27" />
          <span class="theme-swatch" id="swatch-panel"></span>
          <span class="theme-color-label">面板</span>
        </label>
        <label class="theme-color-item" title="文字">
          <input type="color" id="theme-color-text" class="theme-color-input" value="#e8eaef" />
          <span class="theme-swatch" id="swatch-text"></span>
          <span class="theme-color-label">文字</span>
        </label>
        <label class="theme-color-item" title="强调色">
          <input type="color" id="theme-color-accent" class="theme-color-input" value="#6c9eff" />
          <span class="theme-swatch" id="swatch-accent"></span>
          <span class="theme-color-label">强调色</span>
        </label>
      </div>
      <p class="theme-dialogue-preview">
        对话预览：<span class="msg-dialogue">「这是引号内的高亮文字」</span>
      </p>
      <div class="theme-glow-block">
        <label class="checkbox-row">
          <input type="checkbox" id="theme-glow-enabled" checked /> 强调色发光
        </label>
        <label class="theme-shift-row">
          <span>发光强度</span>
          <input type="range" id="theme-glow-intensity" min="0" max="100" step="5" value="65" />
          <span class="theme-shift-val" id="theme-glow-intensity-val">65%</span>
        </label>
        <p class="theme-glow-preview">
          标题预览：<span class="theme-glow-preview-sample">KRYPTOS</span>
        </p>
      </div>
      <div class="theme-font-block">
        <label class="field compact-field">
          <span class="field-label">字体</span>
          <select id="theme-font-family">
            <option value="segoe">Segoe UI</option>
            <option value="system">系统默认</option>
            <option value="yahei">微软雅黑</option>
            <option value="pingfang">苹方</option>
            <option value="serif">衬线</option>
            <option value="mono">等宽</option>
            <option value="custom">本机 / 更多</option>
          </select>
        </label>
        <div class="theme-font-custom-field hidden" id="theme-font-custom-field">
          <div class="font-picker-actions">
            <button type="button" id="btn-load-system-fonts" class="ghost">读取本机字体</button>
            <input type="file" id="theme-font-file" accept=".woff2,.woff,.ttf,.otf,font/woff2,font/woff,font/ttf,font/otf" class="hidden" />
            <button type="button" id="btn-upload-font" class="ghost">上传字体文件</button>
            <span id="theme-font-upload-status" class="font-picker-status"></span>
          </div>
          <label class="field compact-field">
            <span class="field-label">选择或搜索字体</span>
            <input type="text" id="theme-font-custom" list="theme-font-datalist" placeholder="搜索或选择本机字体…" />
            <datalist id="theme-font-datalist"></datalist>
          </label>
          <input type="hidden" id="theme-font-url" value="" />
          <input type="hidden" id="theme-font-face-name" value="" />
        </div>
        <label class="theme-shift-row theme-font-size-row">
          <span>字号</span>
          <input type="range" id="theme-font-size" min="85" max="125" step="5" value="100" />
          <span class="theme-shift-val" id="theme-font-size-val">100%</span>
        </label>
        <p id="theme-font-preview" class="theme-font-preview">预览：角色对话与界面文字将使用此字体。</p>
      </div>
      <div class="row">
        <button type="button" id="btn-save-theme">保存主题</button>
        <button type="button" class="ghost" id="btn-reset-theme">恢复默认</button>
      </div>
    </section>

    <section class="settings-card">
      <h2>全局 API</h2>
      <p class="hint">角色未单独配置时，将使用此处默认值。</p>
      <label>Model <input id="global-model" /></label>
      <label>API Base <input id="global-api-base" /></label>
      <label>Max Tokens
        <input id="global-max-tokens" type="number" min="256" max="32768" step="256" value="4096" />
      </label>
      <p class="hint">角色单次发言最大生成长度。回复经常被截断时可调高。</p>
      <label class="field compact-field">
        <span class="field-label">角色回复篇幅</span>
        <select id="global-reply-length">
          <option value="short">简短（1～2句，推荐）</option>
          <option value="normal">适中（2～4句）</option>
          <option value="long">详细</option>
        </select>
      </label>
      <p class="hint">控制 AI 角色每次发言长短，避免啰嗦和重复交代设定。</p>
      <label>API Key <input id="global-api-key" type="password" placeholder="留空不修改" /></label>
      <div class="row">
        <button type="button" id="btn-save-global">保存 API</button>
        <button type="button" class="ghost" id="btn-test-llm">测试连通</button>
      </div>
      <div id="test-result" class="test-result hidden"></div>
    </section>
  </main>

  <script src="/static/settings.js"></script>
</body>
</html>
